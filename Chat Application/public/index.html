
<html>
  <head>
    <title>Chat App</title>
    <style>
      body { font-family: sans-serif; padding: 20px; }
      #messages { list-style-type: none; margin-bottom: 50px; }
      #messages li { padding: 5px 10px; background: #eee; margin-bottom: 2px; }
      form { position: fixed; bottom: 0; width: 100%; display: flex; left: 0; padding: 10px; background: #fff; }
      input { flex-grow: 1; padding: 10px; }
      button { padding: 10px; background: #28a745; color: white; border: none; }
    </style>
  </head>
  <body>
    <ul id="messages"></ul>
    <form id="form">
      <input id="input" autocomplete="off" /><button>Send</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      var socket = io();
      var form = document.getElementById('form');
      var input = document.getElementById('input');

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (input.value) {
          socket.emit('chat message', input.value);
          input.value = '';
        }
      });

      socket.on('chat message', function(msg) {
        var item = document.createElement('li');
        item.textContent = msg;
        document.getElementById('messages').appendChild(item);
      });
    </script>
  </body>
</html>
